spring.application.name=my-blog
# 数据库核心连接配置（仅改密码，其他别动）
spring.datasource.url=jdbc:mysql://localhost:3306/my_blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&nullCatalogMeansCurrent=true
spring.datasource.username=root
# ********** 唯一需要改的地方 → 换成你的MySQL实际密码 **********
spring.datasource.password=asd123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate7.x 核心必配（仅这一行就够，自动适配所有MySQL8+）
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA开发调试配置（可选，不影响启动）
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# JSON格式优化（前后端分离必配，不影响启动）
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.default-property-inclusion=non_null

# 服务器端口
server.port=8080